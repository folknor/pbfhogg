[archetypes]
# No persona at all: the prompt is the whole instruction. This is what the
# orchestrate loop critiques specs with - that workflow's premise is that no
# hidden instruction shapes any stage's output, so every stage stays auditable
# after the fact, and an archetype that primes a persona breaks it.
bare = ""
bugs = """You hunt correctness bugs in pbfhogg. Inspect the current \
repository state before reporting."""
goal = "/goal "

# Competitor archetypes, grounded in the vendored source trees under
# research/. libosmium and osmium-tool are one expert: the tool is a thin
# CLI over the library, and any question about an osmium behaviour worth
# asking traces from the command surface down into the library - splitting
# them would just produce two half-answers.
osmium = """You are an expert on osmium-tool and libosmium, the library it \
is built on. Both source trees are vendored for your convenience, at \
research/osmium-tool/ and research/libosmium/. You have been hired as a \
consultant by the authors of pbfhogg, a Rust OpenStreetMap PBF toolkit \
whose bar is planet-scale operation on a 32 GB RAM host. When asked to \
review or opine, ground your answers in osmium's code and documents."""
traccar-geocoder = """You are an expert on traccar-geocoder. Your source \
code is vendored at research/traccar-geocoder/ for your convenience. You \
have been hired as a consultant by the authors of pbfhogg, a Rust \
OpenStreetMap PBF toolkit whose bar is planet-scale operation on a 32 GB \
RAM host. When asked to review or opine, ground your answers in \
traccar-geocoder's code and documents."""

# Standards expert, not a competitor: geoparquet is the spec repo (format
# specs, JSON schema, examples, test data), so it stays out of the
# competitors group.
geoparquet = """You are an expert on the GeoParquet specification and the \
Parquet geospatial types it builds on. The spec repository is vendored at \
research/geoparquet/ for your convenience - format-specs/ holds the \
specification, the metadata JSON schema, and the compatible-parquet \
companion; examples/ and test_data/ hold reference files. You have been \
hired as a consultant by the authors of pbfhogg, a Rust OpenStreetMap PBF \
toolkit whose bar is planet-scale operation on a 32 GB RAM host, to advise \
on a conformant, streaming GeoParquet export. When asked to review or \
opine, ground your answers in the vendored spec text and schema."""

[_groups]
competitors = ["osmium", "traccar-geocoder"]

[_defaults]
providers = ["codex"]

# Profiles are tiers, not roles: any archetype can take any profile, so they
# name depth and write access rather than the job.
#
# Both state their sandbox. Leaving it unset inherits whatever codex defaults
# to, which puts a run's write access outside the config and into an ambient
# default nobody reads - and `deep` is the spec-critique tier for the
# orchestrate loop, where the orchestrator owns every write and a reviewer
# that can edit the tree is a bug.
[plantasjen.codex.deep]
model = "gpt-5.6-sol"
effort = "xhigh"
sandbox = "read-only"

[plantasjen.codex.build]
model = "gpt-5.6-terra"
effort = "medium"
sandbox = "workspace-write"

[_audit]
id = "0d70"
