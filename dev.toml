project = "pbfhogg"

# ---------------------------------------------------------------------------
# Datasets — identical across all machines.
# Files resolved as {data}/{filename}.
# Preflight verifies existence. Cannot auto-download (too large).
# ---------------------------------------------------------------------------

[datasets.denmark]
pbf = "denmark-20260220-seq4704-with-indexdata.osm.pbf"
pbf_raw = "denmark-20260220-seq4704.osm.pbf"
osc = "denmark-20260221-seq4705.osc.gz"
bbox = "12.4,55.6,12.7,55.8"
origin = "Geofabrik 2026-02-20 seq 4704, indexdata via pbfhogg cat"

