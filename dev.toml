# ---------------------------------------------------------------------------
# Per-machine configuration, keyed by hostname.
# Unknown hostnames fall back to defaults: data="data", scratch="data/scratch".
# ---------------------------------------------------------------------------

[plantasjen]
data = "data"
scratch = "data/bench-tmp"
target = "target"

[plantasjen.drives]
source = "nvme"
data = "nvme"
scratch = "nvme"
target = "hdd"

[dm6]
data = "/fast/pbfhogg/data"
scratch = "/fast/pbfhogg/scratch"
target = "target"

[dm6.drives]
source = "nvme"
data = "nvme"
scratch = "nvme"
target = "nvme"
